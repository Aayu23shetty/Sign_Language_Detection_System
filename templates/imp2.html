<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignLingo - Sign Language Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/@tensorflow/tfjs"></script>
    <script src="https://unpkg.com/@tensorflow-models/handpose"></script>
</head>
<body class="bg-gradient-to-r from-green-50 to-green-100">

    <div id="app" class="min-h-screen">
        <!-- Login Page -->
        <div id="loginPage" class="min-h-screen flex items-center justify-center">
            <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
                <div class="flex items-center justify-center mb-8">
                    <i class="bi bi-hand-index text-4xl text-green-600 mr-2"></i>
                    <h1 class="text-4xl font-bold text-green-600">LOGIN PAGE</h1>
                </div>
                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Email</label>
                        <input type="email" id="email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500" required>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">Password</label>
                        <input type="password" id="password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500" required>
                    </div>
                    <button type="submit" class="w-full bg-green-600 text-white p-3 rounded-lg hover:bg-green-700 transition-colors font-medium">
                        Login
                    </button>
                </form>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <nav class="bg-green-600">
                <div class="container mx-auto px-4">
                    <div class="flex justify-between items-center py-4">
                        <div class="flex items-center">
                            <i class="bi bi-hand-index text-3xl text-white mr-2"></i>
                            <h1 class="text-2xl font-bold text-white">SignLingo Dashboard</h1>
                        </div>
                        <button id="logoutBtn" class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
                            <i class="bi bi-box-arrow-right mr-2"></i>Logout
                        </button>
                    </div>
                </div>
            </nav>

            <main class="container mx-auto p-6">
                <div class="grid lg:grid-cols-2 gap-6">
                    <!-- Camera Feed -->
                    <div class="bg-white p-6 rounded-xl shadow-lg">
                        <h2 class="text-xl font-bold mb-4 flex items-center">
                            <i class="bi bi-camera-video mr-2 text-green-600"></i>
                            Live Detection
                        </h2>
                        <div class="relative aspect-video bg-gray-100 rounded-lg overflow-hidden">
                            <video id="video" class="w-full h-full object-cover rounded-lg" playsinline></video>
                            <canvas id="canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                        </div>
                        <div class="mt-4 flex space-x-4">
                            <button id="startBtn" class="flex-1 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition-colors">
                                <i class="bi bi-play-fill mr-2"></i>Start Detection
                            </button>
                        </div>
                    </div>

                    <!-- Detection Results -->
                    <div class="bg-white p-6 rounded-xl shadow-lg">
                        <h2 class="text-xl font-bold mb-4 flex items-center">
                            <i class="bi bi-lightning mr-2 text-green-600"></i>
                            Detection Results
                        </h2>
                        <div id="result" class="text-6xl font-bold text-center p-8 bg-gray-50 rounded-lg mb-4">
                            -
                        </div>
                        <div id="confidence" class="text-center text-gray-600 mb-4">
                            Confidence: 0%
                        </div>
                        <div>
                            <h3 class="font-bold mb-2 flex items-center">
                                <i class="bi bi-clock-history mr-2 text-green-600"></i>
                                Recent Detections:
                            </h3>
                            <div id="history" class="space-y-2 max-h-48 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Login functionality
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent form submission
            console.log("Form submitted");  // Debugging
            // Simulate successful login by hiding login page and showing dashboard
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
        });

        // Constants for sign detection
        const SIGNS = {
            0: '0', 1: '1', 2: '2', 3: 'A', 4: 'B', 5: 'C',
            6: 'D', 7: 'E', 8: 'F', 9: 'G', 10: 'H', 11: 'I',12: 'J', 13:'K', 14:'L', 15:'M'
        };

        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let isDetecting = false;
        let model;

        async function setupCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 },
                audio: false,
            });
            video.srcObject = stream;
            return new Promise(resolve => {
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve(video);
                };
            });
        }

        async function startDetection() {
            if (!isDetecting) {
                isDetecting = true;
                model = await handpose.load();
                document.getElementById('startBtn').innerHTML = '<i class="bi bi-stop-fill mr-2"></i>Stop Detection';
                detectHands();
            } else {
                isDetecting = false;
                document.getElementById('startBtn').innerHTML = '<i class="bi bi-play-fill mr-2"></i>Start Detection';
            }
        }

        async function detectHands() {
            if (!isDetecting) return;

            const predictions = await model.estimateHands(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (predictions.length > 0) {
                // Draw hand landmarks
                predictions.forEach(prediction => {
                    prediction.landmarks.forEach((landmark, index) => {
                        ctx.beginPath();
                        ctx.arc(landmark[0], landmark[1], 5, 0, 2 * Math.PI);
                        ctx.fillStyle = index === 0 ? '#FF0000' : '#4CAF50';
                        ctx.fill();

                        // Draw connections between landmarks
                        if (index > 0) {
                            const prevLandmark = prediction.landmarks[index - 1];
                            ctx.beginPath();
                            ctx.moveTo(prevLandmark[0], prevLandmark[1]);
                            ctx.lineTo(landmark[0], landmark[1]);
                            ctx.strokeStyle = '#4CAF50';
                            ctx.lineWidth = 2;
                            ctx.stroke();
                        }
                    });
                });

                // Simulate sign detection (replace with actual gesture recognition logic)
                const randomSign = SIGNS[Math.floor(Math.random() * Object.keys(SIGNS).length)];
                const confidence = Math.floor(Math.random() * 100);
                document.getElementById('result').textContent = randomSign;
                document.getElementById('confidence').textContent = `Confidence: ${confidence}%`;

                // Update history
                const history = document.getElementById('history');
                const historyItem = document.createElement('div');
                historyItem.textContent = `Sign: ${randomSign}, Confidence: ${confidence}%`;
                history.prepend(historyItem);

                // Send detection data to server for storage
                const detectionData = { sign: randomSign, confidence: confidence };

                try {
                    const response = await fetch('http://localhost:3000/save-detection', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(detectionData),
                    });

                    const data = await response.json();
                    if (response.ok) {
                        console.log('Detection saved successfully:', data);
                    } else {
                        console.error('Failed to save detection:', data.error);
                    }
                } catch (error) {
                    console.error('Error sending detection to server:', error);
                }
            }


            requestAnimationFrame(detectHands);
        }

        // Initialize camera and start detection
        setupCamera();
        document.getElementById('startBtn').addEventListener('click', startDetection);
    </script>

</body>
</html>
